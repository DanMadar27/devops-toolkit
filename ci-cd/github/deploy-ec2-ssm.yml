name: Deploy to EC2

# Trigger: push to master or manually
# Actions: Run deploy.sh script in EC2. If fails sends a Slack notification.

# Prerequisite: IAM user with a policy to send ssm command:
# {
#   "Version": "2012-10-17",
#   "Statement": [
#     {
#       "Sid": "SSMSendCommand",
#       "Effect": "Allow",
#       "Action": [
#         "ssm:SendCommand",
#         "ssm:GetCommandInvocation",
#         "ssm:ListCommandInvocations",
#         "ssm:DescribeInstanceInformation"
#       ],
#       "Resource": "*"
#     },
#     {
#       "Sid": "EC2DescribeForSSM",
#       "Effect": "Allow",
#       "Action": [
#         "ec2:DescribeInstances",
#         "ec2:DescribeInstanceStatus"
#       ],
#       "Resource": "*"
#     }
#   ]
# }
# Or more tightened:
# {
# 	"Version": "2012-10-17",
# 	"Statement": [
# 		{
# 			"Sid": "SSMGetCommand",
# 			"Effect": "Allow",
# 			"Action": [
# 				"ssm:GetCommandInvocation",
# 				"ssm:ListCommandInvocations",
# 				"ssm:DescribeInstanceInformation"
# 			],
# 			"Resource": "*"
# 		},
# 		{
# 			"Sid": "EC2DescribeForSSM",
# 			"Effect": "Allow",
# 			"Action": [
# 				"ec2:DescribeInstances",
# 				"ec2:DescribeInstanceStatus"
# 			],
# 			"Resource": "*"
# 		},
# 		{
# 			"Sid": "SSMSendCommand",
# 			"Effect": "Allow",
# 			"Action": [
# 				"ssm:SendCommand"
# 			],
# 			"Resource": [
# 				"arn:aws:ec2:<region>:<account-id>:instance/<instance-id>",
# 				"arn:aws:ssm:<region>::document/AWS-RunShellScript"
# 			]
# 		}
# 	]
# }

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy via SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy dev ${{ github.sha }}" \
            --parameters 'commands=["sudo su - ubuntu -c \"bash ~/deploy.sh\""]' \
            --query "Command.CommandId" \
            --output text)

          MAX_ATTEMPTS=40
          ATTEMPT=0
          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
              --query Status --output text)
            case "$STATUS" in
              Success|Failed|Cancelled|TimedOut) break ;;
            esac
            ATTEMPT=$((ATTEMPT + 1))
            sleep 15
          done

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --query "{status:Status, stdout:StandardOutputContent, stderr:StandardErrorContent}"

          [ "$STATUS" = "Success" ]
     
      - name: Notify Slack on failure
        if: failure()
        run: |
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{"text":":red_circle: Deploy Dev workflow failed"}'