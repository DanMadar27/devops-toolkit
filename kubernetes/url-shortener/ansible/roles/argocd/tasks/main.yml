---
- name: Download Helm install script
  get_url:
    url: https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3
    dest: /tmp/get-helm-3.sh
    mode: "0700"
  become: true

- name: Install Helm
  command: /tmp/get-helm-3.sh
  args:
    creates: /usr/local/bin/helm
  become: true

- name: Add ArgoCD Helm repository
  command: helm repo add argo https://argoproj.github.io/argo-helm
  changed_when: false
  become: true

- name: Update Helm repositories
  command: helm repo update
  changed_when: false
  become: true

- name: Create argocd namespace
  command: kubectl create namespace argocd
  register: ns_result
  failed_when: ns_result.rc != 0 and 'already exists' not in ns_result.stderr
  changed_when: ns_result.rc == 0
  become: true
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml

- name: Install ArgoCD via Helm
  command: >
    helm upgrade --install argocd argo/argo-cd
    -n argocd
    --wait
  become: true
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml

- name: Copy app-of-apps manifest to remote host
  copy:
    src: "{{ playbook_dir }}/../k8s/argocd/app-of-apps.yaml"
    dest: /tmp/app-of-apps.yaml
    mode: "0644"

- name: Apply app-of-apps manifest
  command: kubectl apply -f /tmp/app-of-apps.yaml
  become: true
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
