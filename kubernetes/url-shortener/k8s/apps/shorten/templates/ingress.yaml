apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: shorten
  annotations:
    argocd.argoproj.io/health-check-disabled: "true"
spec:
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: shorten
                port:
                  number: {{ .Values.service.port }}
