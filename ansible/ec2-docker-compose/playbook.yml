---
# Usage:
#   ansible-playbook -i inventory.ini playbook.yml -e @vars.yml
#
# First run: fresh install (Docker + clone + start)
# Subsequent runs: idempotent (git pull + restart only if changed)
#
# GPU instance: add install_nvidia: true to vars.yml

- name: Configure EC2 and deploy project
  hosts: ec2
  become: true
  roles:
    - docker
    - role: nvidia
      when: install_nvidia | default(false)
    - app
