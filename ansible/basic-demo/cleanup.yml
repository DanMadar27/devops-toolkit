---
- name: Cleanup web server
  hosts: webservers
  become: true

  tasks:
    - name: Stop Nginx
      service:
        name: nginx
        state: stopped
        enabled: false

    - name: Remove index page
      file:
        path: /var/www/html/index.html
        state: absent

    - name: Uninstall Nginx
      apt:
        name: nginx
        state: absent
        purge: yes        # remove config files too
        autoremove: yes   # remove unused dependencies