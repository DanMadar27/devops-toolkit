server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /var/promtail/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker-json-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: docker
          instance: docker-host
          __path__: /var/lib/docker/containers/*/*.log
    pipeline_stages:
      - json:
          expressions:
            output: log
            stream: stream
            timestamp: time
            container_name: attrs.tag
      - template:
          source: service_name
          template: "{{ .container_name }}"
      - labels:
          stream:
          container_name:
          service_name:
      - timestamp:
          source: timestamp
          format: RFC3339Nano
      - output:
          source: output
