## RabbitMQ production config
## Only the settings worth overriding — everything else stays at sane defaults.

# ── Networking ────────────────────────────────────────────────────────────────

# How long a client can take to complete the AMQP handshake after connecting.
# Default 10s is fine; raise if your services are slow to start.
handshake_timeout = 10000

# ── Resource limits ───────────────────────────────────────────────────────────

# Pause publishing when free disk space drops below this threshold.
# Prevents the broker from crashing when the volume fills up.
# Set to ~10% of your data volume size.
disk_free_limit.absolute = 2GB

# Pause publishing when RAM usage exceeds this fraction of total system RAM.
# 0.4 (40%) is the conservative default — fine for production.
vm_memory_high_watermark.relative = 0.4

# ── Monitoring / Prometheus ───────────────────────────────────────────────────

# Exposes /metrics on port 15692 (no auth by default — keep it internal).
prometheus.return_per_object_metrics = true

# How often internal stats are refreshed (milliseconds).
# 5000ms is the default. Lower values increase CPU load.
collect_statistics_interval = 5000

# ── Logging ───────────────────────────────────────────────────────────────────

# Log to stdout so Docker captures it with `docker logs`.
log.console = true
log.console.level = info

# Uncomment to also write to a file inside the container:
# log.file = /var/log/rabbitmq/rabbitmq.log
# log.file.level = info

# ── Security ──────────────────────────────────────────────────────────────────

# Disable the guest user from logging in from any host other than localhost.
# This is already the default — listed here as an explicit reminder.
# Your real credentials come from RABBITMQ_DEFAULT_USER/PASS env vars.
loopback_users.guest = true

# Uncomment to require TLS on the AMQP port (5671):
# listeners.ssl.default = 5671
# ssl_options.certfile = /etc/rabbitmq/certs/cert.pem
# ssl_options.keyfile  = /etc/rabbitmq/certs/key.pem
# ssl_options.cafile   = /etc/rabbitmq/certs/ca.pem
# ssl_options.verify   = verify_peer
# ssl_options.fail_if_no_peer_cert = true
